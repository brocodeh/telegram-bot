zerops:
  - setup: python
    build:
      base: python@3.12
      deployFiles:
        - app.py
      addToRunPrepare:
        - requirements.txt
    run:
      base: python@3.12
      prepareCommands:
        - python3 -m pip install -r requirements.txt
      ports:
        - port: 5000
          httpSupport: true
      start: python3 app.py
